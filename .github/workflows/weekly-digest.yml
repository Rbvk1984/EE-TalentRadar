# ============================================================
#  TALENTРАDAR — WEEKLY EMAIL DIGEST
#  Equal Experts India
#
#  Runs every Monday at 9:00 AM IST (3:30 AM UTC)
#  Sends each recruiter their top 10 domain contributors
#
#  ONE-TIME SETUP (5 minutes):
#  1. Go to your GitHub repo → Settings → Secrets and variables
#     → Actions → New repository secret
#  2. Add these 3 secrets:
#
#     GH_TOKEN         → your GitHub personal access token
#                        (github.com/settings/tokens → read:user scope)
#
#     SENDER_EMAIL     → the email address that SENDS the digest
#                        (your Gmail or Outlook address)
#
#     SENDER_PASSWORD  → your app password (NOT your normal password)
#                        Gmail:   myaccount.google.com/apppasswords
#                        Outlook: account.microsoft.com/security → App passwords
#
#  To trigger manually anytime: go to Actions tab → Weekly Talent Digest → Run workflow
# ============================================================

name: Weekly Talent Digest

on:
  schedule:
    - cron: '30 3 * * 1'   # Every Monday 9:00 AM IST
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run TalentRadar digest
        env:
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:   ${{ secrets.SENDER_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, time, smtplib, requests
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          # ── CONFIGURATION ─────────────────────────────────
          # To reassign a recruiter: change name + email below
          # Then commit — next Monday's digest uses new details

          RECRUITERS = [
            {"id": "devops",   "label": "DevOps & Platform",      "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "mobile",   "label": "Android & iOS Mobile",   "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "backend",  "label": "Backend Developers",     "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "frontend", "label": "Frontend Developers",    "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "qa",       "label": "QA & SDET",              "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "data",     "label": "Data Engineers",         "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
            {"id": "genai",    "label": "GenAI & ML Engineers",   "name": "Vijay Kumar", "email": "vijay.kumar@equalexperts.com"},
          ]

          CITIES = ["Bengaluru", "Hyderabad", "Pune", "Chennai", "NCR"]
          TOP_N  = 10

          ROLES = {
            "devops": {
              "must": ["kubernetes","terraform","docker","github actions","ci/cd","devops","sre","platform engineering"],
              "good": ["helm","argocd","ansible","prometheus","grafana","aws","gcp","azure","python","golang","java","nodejs","istio","pulumi"],
              "excl": ["bash only","shell scripting"]
            },
            "mobile": {
              "must": ["android","kotlin","swift","ios","flutter","react native","mobile developer"],
              "good": ["jetpack compose","swiftui","coroutines","xcode","dart","kmm","kotlin multiplatform"],
              "excl": []
            },
            "backend": {
              "must": ["java","golang","node.js","python","microservices","backend","backend developer"],
              "good": ["kafka","grpc","postgresql","redis","spring boot","distributed systems","rust","scala"],
              "excl": []
            },
            "frontend": {
              "must": ["react","typescript","vue","next.js","javascript","frontend","front-end"],
              "good": ["tailwind","graphql","storybook","svelte","angular","vite","web performance"],
              "excl": []
            },
            "qa": {
              "must": ["playwright","selenium","cypress","test automation","sdet","qa engineer","quality engineering"],
              "good": ["k6","jest","appium","performance testing","pact","jmeter","bdd","cucumber"],
              "excl": []
            },
            "data": {
              "must": ["apache spark","dbt","airflow","data pipeline","data engineer","etl","elt"],
              "good": ["kafka","snowflake","bigquery","flink","delta lake","databricks","redshift","trino"],
              "excl": []
            },
            "genai": {
              "must": ["llm","langchain","rag","fine-tuning","pytorch","generative ai","genai","large language model"],
              "good": ["hugging face","vector database","prompt engineering","mlflow","openai","anthropic","transformers","embeddings"],
              "excl": []
            }
          }

          GH_TOKEN        = os.environ["GH_TOKEN"]
          SENDER_EMAIL    = os.environ["SENDER_EMAIL"]
          SENDER_PASSWORD = os.environ["SENDER_PASSWORD"]
          HEADERS         = {"Authorization": f"token {GH_TOKEN}", "Accept": "application/vnd.github.v3+json"}

          # ── GITHUB SEARCH ──────────────────────────────────
          def search_profiles(role_id):
            role, seen, results = ROLES[role_id], set(), []
            for city in CITIES:
              for term in role["must"][:2]:
                q   = f"location:{city} {term} in:bio"
                url = f"https://api.github.com/search/users?q={requests.utils.quote(q)}&per_page=20&sort=followers"
                r   = requests.get(url, headers=HEADERS)
                if r.status_code != 200:
                  time.sleep(3); continue
                for u in r.json().get("items", []):
                  if u["login"] in seen: continue
                  seen.add(u["login"])
                  pr = requests.get(f"https://api.github.com/users/{u['login']}", headers=HEADERS)
                  if pr.status_code != 200: continue
                  p = pr.json()
                  s = score(p, role)
                  if s > 0: results.append({**p, "_score": s})
                time.sleep(1)
            results.sort(key=lambda x: x["_score"], reverse=True)
            return results[:TOP_N]

          def score(p, role):
            text = " ".join(filter(None,[p.get("bio"),p.get("login"),p.get("name"),p.get("company"),p.get("blog")])).lower()
            if not any(k in text for k in role["must"]): return 0
            s = 30
            s += min(20, (p.get("public_repos") or 0) // 5)
            s += min(20, (p.get("followers") or 0) // 20)
            for k in role["good"]:
              if k in text: s += 5
            if p.get("blog"):  s += 5
            if p.get("email"): s += 5
            return min(100, s)

          # ── EMAIL BUILDER ──────────────────────────────────
          def build_email(profiles, rec):
            date_str = datetime.now(timezone.utc).strftime("%d %B %Y")
            rows = ""
            for i, p in enumerate(profiles, 1):
              sc  = min(100, round(p["_score"]))
              bio = (p.get("bio") or "No bio available")[:120]
              loc = p.get("location") or "—"
              rows += f"""
              <tr style="border-bottom:1px solid #f0ede6">
                <td style="padding:14px 10px;vertical-align:top;width:32px">
                  <div style="width:28px;height:28px;border-radius:50%;background:#E6F7FC;text-align:center;line-height:28px;font-size:12px;font-weight:600;color:#0e8ab5">{i}</div>
                </td>
                <td style="padding:14px 10px;vertical-align:top">
                  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                    <img src="{p.get('avatar_url','')}" width="34" height="34" style="border-radius:50%">
                    <div>
                      <div style="font-size:14px;font-weight:600;color:#1a1a18">{p.get('name') or p['login']}</div>
                      <a href="https://github.com/{p['login']}" style="font-size:12px;color:#1BAEE1;text-decoration:none">@{p['login']}</a>
                    </div>
                  </div>
                  <div style="font-size:12px;color:#555;margin-bottom:5px">{bio}</div>
                  <div style="font-size:11px;color:#888">📍 {loc} &nbsp;·&nbsp; {p.get('public_repos',0)} repos &nbsp;·&nbsp; {p.get('followers',0)} followers</div>
                  {f'<div style="font-size:11px;color:#888;margin-top:3px">🌐 <a href="{p["blog"]}" style="color:#1BAEE1">{p["blog"][:50]}</a></div>' if p.get("blog") else ""}
                </td>
                <td style="padding:14px 10px;vertical-align:top;text-align:center;min-width:60px">
                  <div style="font-size:20px;font-weight:700;color:#1BAEE1">{sc}</div>
                  <div style="font-size:10px;color:#aaa">/100</div>
                  <div style="height:4px;background:#f0ede6;border-radius:2px;margin-top:6px;width:48px">
                    <div style="height:4px;width:{sc}%;background:#1BAEE1;border-radius:2px"></div>
                  </div>
                </td>
              </tr>"""

            return f"""<html><body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ef;margin:0;padding:20px">
            <div style="max-width:620px;margin:0 auto">
              <div style="background:#1BAEE1;border-radius:12px 12px 0 0;padding:18px 24px;display:flex;align-items:center;justify-content:space-between">
                <div>
                  <div style="font-size:18px;font-weight:700;color:#fff">TalentRadar Digest</div>
                  <div style="font-size:12px;color:#cceef8;margin-top:2px">{rec['label']} · {date_str}</div>
                </div>
                <div style="background:#0e8ab5;border-radius:8px;padding:5px 12px;font-size:11px;color:#fff;font-weight:600">EQUAL EXPERTS</div>
              </div>
              <div style="background:#fff;border-radius:0 0 12px 12px;overflow:hidden">
                <div style="padding:14px 24px;background:#E6F7FC;border-bottom:1px solid #7dd4ee">
                  <div style="font-size:13px;color:#0e8ab5">Hi {rec['name']}, here are your top <strong>{len(profiles)}</strong> {rec['label']} contributors this week across <strong>{", ".join(CITIES)}</strong>.</div>
                </div>
                <table style="width:100%;border-collapse:collapse">{rows}</table>
                <div style="padding:14px 24px;background:#f8f7f3;border-top:1px solid #e0dfd7;font-size:11px;color:#aaa;text-align:center">
                  TalentRadar · Equal Experts India · Automated weekly digest<br>
                  To update recruiter assignments, edit the RECRUITERS list in weekly-digest.yml
                </div>
              </div>
            </div></body></html>"""

          # ── SEND ───────────────────────────────────────────
          def send(to_email, to_name, subject, html):
            msg = MIMEMultipart("alternative")
            msg["Subject"] = subject
            msg["From"]    = f"TalentRadar — Equal Experts <{SENDER_EMAIL}>"
            msg["To"]      = f"{to_name} <{to_email}>"
            msg.attach(MIMEText(html, "html"))
            host = "smtp.gmail.com" if "gmail" in SENDER_EMAIL.lower() else "smtp.office365.com"
            with smtplib.SMTP(host, 587) as s:
              s.starttls()
              s.login(SENDER_EMAIL, SENDER_PASSWORD)
              s.sendmail(SENDER_EMAIL, to_email, msg.as_string())
            print(f"  ✓ Sent → {to_name} <{to_email}>")

          # ── MAIN ───────────────────────────────────────────
          sent = set()
          for rec in RECRUITERS:
            if rec["id"] in sent:
              print(f"  Skipping {rec['id']} (same recruiter already sent)")
              continue
            print(f"\nSearching for {rec['label']}...")
            profiles = search_profiles(rec["id"])
            print(f"  Found {len(profiles)} profiles")
            if not profiles:
              print("  No results — skipping"); continue
            html = build_email(profiles, rec)
            send(rec["email"], rec["name"], f"TalentRadar Digest — Top {rec['label']} This Week", html)
            sent.add(rec["id"])
            time.sleep(2)

          print("\nAll digests sent successfully.")
          PYEOF
