# ============================================================
#  WEEKLY EMAIL DIGEST — GitHub Actions
#  Runs every Monday at 9:00 AM IST (3:30 AM UTC)
#  Sends each recruiter their top 10 domain contributors
#
#  SETUP (one-time, 5 minutes):
#  1. Go to your GitHub repo → Settings → Secrets → Actions
#  2. Add secret: SENDER_EMAIL   → your Gmail or Outlook address
#  3. Add secret: SENDER_PASSWORD → your app password (see below)
#  4. Add secret: GH_TOKEN        → your GitHub personal access token
#
#  Gmail app password:  myaccount.google.com/apppasswords
#  Outlook app password: account.microsoft.com/security → app passwords
# ============================================================

name: Weekly Talent Digest

on:
  schedule:
    - cron: '30 3 * * 1'   # Every Monday 9:00 AM IST
  workflow_dispatch:         # Also lets you trigger manually from GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run digest script
        env:
          GH_TOKEN:          ${{ secrets.GH_TOKEN }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD:   ${{ secrets.SENDER_PASSWORD }}
        run: python .github/workflows/send_digest.py
